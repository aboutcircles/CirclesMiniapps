<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Rep Score Explorer">
  <defs>
    <linearGradient id="rs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4335df"/>
      <stop offset="100%" stop-color="#0e00a8"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#rs-bg)"/>
  <!-- ascending reputation line -->
  <path d="M26 86 L52 64 L72 76 L102 38"
        fill="none" stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- soft area under the line -->
  <path d="M26 86 L52 64 L72 76 L102 38 L102 98 L26 98 Z" fill="#ffffff" opacity="0.12"/>
  <!-- node markers -->
  <circle cx="52" cy="64" r="5" fill="#ffffff"/>
  <circle cx="102" cy="38" r="7.5" fill="#ffffff"/>
  <circle cx="102" cy="38" r="3.5" fill="#0e00a8"/>
</svg>
