# Netlify config for the NFT Viewer miniapp.
#
# Two ways to deploy:
#
# 1. **Git integration (recommended)** — In the Netlify dashboard, link this
#    repo to your existing site, then set:
#      - Base directory: `examples/nft-viewer`
#      - Build command:   `npm run build`
#      - Publish dir:     `dist`
#      - Branch:           `feature/nft-viewer-miniapp` (or whichever branch
#        you want deployed)
#    Every push to that branch will auto-deploy.
#
# 2. **CLI** — From `examples/nft-viewer/`, run:
#      `npx netlify deploy --prod`
#    (You'll need to be logged in: `npx netlify login`, then link the
#    site once with `npx netlify link`.)
#
# See README.md → "Deploy to Netlify" for the full walkthrough.

[build]
  base = "."
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — any unknown path serves index.html so client-side
# routing (e.g. `?wallet=0x...`) works after a deep link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200