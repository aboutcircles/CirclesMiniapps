<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circles Jukebox · Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>
  <div id="tsparticles" aria-hidden="true"></div>

  <div class="stage">
    <header class="stage-header">
      <div class="brand">
        <span class="brand-text">Circles Jukebox</span>
      </div>
      <div class="status">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </header>

    <main class="stage-main">
      <section class="now-playing-card" id="now-playing-card">
        <div class="now-playing-art-wrap">
          <img id="now-playing-art" class="now-playing-art" alt="" src="/idle-art.jpg" />
        </div>
        <div class="now-playing-meta">
          <div class="now-playing-label">Now playing</div>
          <h2 id="now-playing-title" class="now-playing-title">Waiting for a request…</h2>
          <div id="now-playing-artist" class="now-playing-artist"></div>
          <div id="now-playing-attribution" class="now-playing-attribution"></div>
        </div>
      </section>

      <aside class="up-next">
        <h3>Up next</h3>
        <div id="up-next-list" class="up-next-list">
          <div class="up-next-empty">Pay 10 CRC in the Circles Jukebox miniapp to queue a song.</div>
        </div>
      </aside>
    </main>

    <footer class="stage-footer">
      <span>Powered by Circles · Pay 10 CRC in the Jukebox miniapp to add a song</span>
    </footer>
  </div>

  <!-- Bottom-right call-to-action QR codes. Static images in public/. -->
  <aside class="qr-corner" aria-label="Join Circles or open the jukebox">
    <figure class="qr-tile">
      <img class="qr-img" src="/qr-join.png" alt="QR code to get the Circles app" />
      <figcaption>Get the app!</figcaption>
    </figure>
    <figure class="qr-tile">
      <img class="qr-img" src="/qr-jukebox.svg" alt="QR code to open the Circles Jukebox miniapp" />
      <figcaption>Pay to play!</figcaption>
    </figure>
  </aside>

  <!-- Hidden SoundCloud widget; this is the audio source for the room. -->
  <iframe
    id="sc-widget"
    width="100%"
    height="166"
    scrolling="no"
    frameborder="no"
    allow="autoplay; encrypted-media"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/&color=%230e00a8&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
  </iframe>

  <!-- Tap-to-resume overlay: shown when browser blocks autoplay after refresh -->
  <div id="tap-overlay" class="tap-overlay hidden">
    <div class="tap-overlay-content">
      <div class="tap-icon">▶</div>
      <div class="tap-text">Tap to start the jukebox</div>
    </div>
  </div>

  <script>
    // tsParticles — organic ambient particle field
    tsParticles.load("tsparticles", {
      fullScreen: { enable: true, zIndex: 0 },
      fpsLimit: 30,
      particles: {
        number: { value: 40, density: { enable: true } },
        color: { value: ["#e8a850", "#7a9a7e", "#5b8c85", "#c4a882", "#d1a96a"] },
        shape: { type: "circle" },
        opacity: {
          value: { min: 0.1, max: 0.6 },
          animation: { enable: true, speed: 0.3, sync: false, minimumValue: 0.1 }
        },
        size: {
          value: { min: 2, max: 14 },
          animation: { enable: true, speed: 1.5, sync: false, minimumValue: 1 }
        },
        move: {
          enable: true,
          speed: { min: 0.3, max: 1.2 },
          direction: "none",
          random: true,
          straight: false,
          outModes: { default: "bounce" },
          trail: { enable: true, length: 6, fill: { color: "#fef9f0" } }
        },
        links: {
          enable: true,
          distance: 150,
          color: "#c4a882",
          opacity: 0.2,
          width: 0.8,
          triangles: { enable: false }
        }
      },
      interactivity: {
        events: {
          onHover: { enable: true, mode: "grab" },
          onClick: { enable: false }
        },
        modes: {
          grab: { distance: 180, links: { opacity: 0.4, color: "#e8a850" } }
        }
      },
      background: {
        color: { value: "transparent" }
      },
      detectRetina: true
    });
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
