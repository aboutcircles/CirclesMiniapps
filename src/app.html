<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Privacy-friendly analytics by Plausible -->
		<script async src="https://plausible.io/js/pa-sd1kssrVcdW9E3CERK0Ll.js"></script>
		<script>
			window.plausible =
				window.plausible ||
				function () {
					(plausible.q = plausible.q || []).push(arguments);
				};
			plausible.init =
				plausible.init ||
				function (i) {
					plausible.o = i || {};
				};
			plausible.init();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/circles-token.svg" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<!-- The web-app manifest is chosen per URL, synchronously at parse time,
		     so pilot pages (e.g. /pilots/dams) install as their own app instead
		     of Miniapps. It can't be a static link: the server answers clean
		     URLs with the SPA fallback shell (one file for every route), and a
		     svelte:head link lands only after hydration — too late for the
		     browser's install evaluation. Keep in sync with updateManifestLink()
		     in src/routes/+layout.svelte. -->
		<script>
			(function () {
				var link = document.createElement('link');
				link.rel = 'manifest';
				link.href =
					location.pathname === '/pilots/dams' ? '/pilots/dams.webmanifest' : '/manifest.webmanifest';
				document.head.appendChild(link);
			})();
		</script>
		<meta name="theme-color" content="#0e00a8" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender="true">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
